<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map/Filter/Reduce practice</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Map/Filter/Reduce practice</h1>

  <section class="carousel" aria-label="Exercise carousel">
    <div class="carousel-controls">
      <button type="button" class="carousel-button" data-action="prev">Previous</button>
      <span class="carousel-counter"></span>
      <button type="button" class="carousel-button" data-action="next">Next</button>
    </div>

    <section id="exercise-1" class="exercise">
      <h2 class="exercise-title"></h2>

      <div class="block">
        <h3>Question</h3>
        <p class="question"></p>
      </div>

      <div class="block">
        <h3>Sample data</h3>
        <pre class="sample-data"></pre>
      </div>

      <div class="block">
        <details>
          <summary>Solution</summary>
          <div class="solution-panel">
            <pre class="solution"></pre>
            <div class="output-window">
              <strong>Output</strong>
              <pre class="output"></pre>
            </div>
          </div>
        </details>
      </div>
    </section>
  </section>

  <script src="map_filter_reduce_practice.js" type="text/javascript"></script>
  <script src="map_filter_reduce_practice_2.js" type="text/javascript"></script>
  <script src="sort_spread_practice.js" type="text/javascript"></script>
  <script src="exercises.js" type="text/javascript"></script>
  <script src="stacks_of_cans.js" type="text/javascript"></script>
  <script src="destructuring_template_practice.js" type="text/javascript"></script>
</body>
</html>
